<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Dark overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.container {
  position: relative;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  color: #fff;
  width: 90%;
  max-width: 400px;
}

h1 {
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.buttons a {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  text-decoration: none;
  color: #fff;
  font-weight: 500;
  transition: 0.3s;
}

.whatsapp {
  background: #25D366;
}

.email {
  background: #007BFF;
}

.buttons a:hover {
  opacity: 0.8;
}

#qrcode {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1>Contact Me</h1>
  <p>Let’s build your next website 🚀</p>

  <div class="buttons">
    <a class="whatsapp" href="https://wa.me/234XXXXXXXXXX" target="_blank">Chat on WhatsApp</a>
    <a class="email" href="mailto:youremail@gmail.com">Send Email</a>
  </div>

  <div id="qrcode"></div>
</div>

<!-- QRCode Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://wa.me/2349168144059",
  width: 150,
  height: 150
});
</script>

</body>
</html>
