<!DOCTYPE html>
<html>
<head>
  <title>Auth System</title>
</head>
<body>

<h2>Create Account</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<input id="phone" placeholder="+234XXXXXXXXXX"><br><br>

<button onclick="signup()">Sign Up</button>

<h3>Phone Verification</h3>
<div id="recaptcha-container"></div>

<input id="code" placeholder="Enter OTP"><br><br>
<button onclick="verifyCode()">Verify Phone</button>
<script src="script.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔑 YOUR CONFIG (replace this)
const firebaseConfig = {
  apiKey: "AIzaSyDLvK-Q4v1hZ2B-mtxZzNXs5m1tCS6LdGw",
  authDomain: "neobank-app-3ebbe.firebaseapp.com",
  projectId: "neobank-app-3ebbe",
  storageBucket: "neobank-app-3ebbe.firebasestorage.app",
  messagingSenderId: "258331631270",
  appId: "1:258331631270:web:f4eeeb8ac1e3177bb21e67",
  measurementId: "G-9VRK9ZZXYS"

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔐 SIGNUP FUNCTION
window.signup = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    // Send email verification
    await sendEmailVerification(userCredential.user);
    alert("Verification email sent!");

    // Save user to Firestore
    await setDoc(doc(db, "users", userCredential.user.uid), {
      email: email,
      phone: phone,
      verified: false,
      createdAt: new Date()
    });

    // Setup reCAPTCHA
    window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {}, auth);

    // Send OTP
    const confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    window.confirmationResult = confirmationResult;

    alert("OTP sent to phone!");

  } catch (err) {
    alert(err.message);
  }
};


// 📱 VERIFY OTP
window.verifyCode = async () => {
  const code = document.getElementById("code").value;

  try {
    await window.confirmationResult.confirm(code);
    alert("Phone verified!");

  } catch (err) {
    alert("Invalid code");
  }
};
</script>

</body>
</html>
